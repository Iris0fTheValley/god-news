name: quality

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python contracts
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      ANONYMIZED_TELEMETRY: "False"
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv and Python
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Restore locked environment
        run: uv sync --extra dev --extra fetchers --locked

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run mypy src/god_news

      - name: Test with coverage gate
        run: >-
          uv run pytest
          --cov=god_news
          --cov-report=term-missing
          --cov-fail-under=75

  web:
    name: Web and video contracts
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv and Python
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Restore backend runtime for OpenAPI generation
        run: uv sync --locked

      - name: Install pnpm
        uses: pnpm/action-setup@008330803749db0355799c700092d9a85fd074e9 # v6.0.9

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22.12.0"
          cache: pnpm

      - name: Restore locked workspace
        run: pnpm install --frozen-lockfile

      - name: Check frontend
        run: pnpm ui:check

      - name: Check generated API clients are committed
        run: git diff --exit-code -- frontend/openapi.json frontend/src/api/generated.ts

      - name: Check Remotion package
        run: pnpm video:check
